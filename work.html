  <script>
    $(function () {
      // ── Clock ──
      function tick() {
        const d = new Date();
        const t = [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
        $('#clock').text(t);
      }
      tick();
      setInterval(tick, 1000);

      // ── Simple Mouse Parallax ──
      $(document).on('mousemove', function (e) {
        const rx = e.clientX / window.innerWidth - .5;
        const ry = e.clientY / window.innerHeight - .5;
        gsap.to('.mb1', { x: rx * 50, y: ry * 50, duration: 2.5, ease: 'power1.out' });
        gsap.to('.mb2', { x: rx * -35, y: ry * -35, duration: 2.5, ease: 'power1.out' });
        gsap.to('.mb3', { x: rx * 25, y: ry * 20, duration: 2.5, ease: 'power1.out' });
      });

      // ── Case Study Content Data ──
      const caseStudies = {
        '1': {
          title: 'Rewatch',
          category: 'AI-assisted discovery for shared living rooms — a concept exploring how Google TV could design for the room, not just the account holder.',
          role: 'Interaction Designer (Concept)',
          duration: '9 Months (2026)',
          platform: 'Google TV / Voice Devices',
          outcome: '-78% Search Time',
          image: 'img/blog/Rewatch.png',
          body: `
          <div class="case-study-section" id="ep00">
            <h2>Episode 00 — Frame the Problem</h2>
            <p>Google TV's homescreen assumes a single viewer's taste. Shared households — couples, roommates, multi-generational families — either browse endlessly, default to whoever grabbed the remote first, or fall back to a familiar rewatch out of decision fatigue.</p>
            
            <div class="callout">
              <div class="label">Why AI is the right lever</div>
              <p>This isn't solvable with better information architecture alone. It requires <strong>inferring</strong> who's in the room and <strong>negotiating</strong> between competing preferences in real time — turning "whose turn is it to pick" into a shared, low-effort decision instead of a source of friction.</p>
            </div>
          </div>

          <div class="case-study-section" id="ep01">
            <h2>Episode 01 — Research</h2>
            <p>Streaming decision fatigue is well documented, co-viewing is rising, and Google TV's single-profile design is a known, active pain point — together they build the case for this project.</p>
            
            <div class="stats">
              <div class="stat"><div class="num">7–10.5</div><div class="lbl">Minutes spent deciding what to watch, per session</div></div>
              <div class="stat"><div class="num">110</div><div class="lbl">Hours per year spent scrolling streaming apps</div></div>
              <div class="stat"><div class="num">94%</div><div class="lbl">Of parents report co-viewing more than a year ago</div></div>
              <div class="stat"><div class="num">1</div><div class="lbl">Profile Google TV assumes per household</div></div>
            </div>

            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Insight</th>
                  <th>Evidence</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Decision fatigue is large and growing</td>
                  <td>Nielsen, State of Play (2023)</td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Co-viewing is increasing, not shrinking</td>
                  <td>Future Today study (2022)</td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Shared friction has real relational cost</td>
                  <td>Lancaster University (2019)</td>
                </tr>
                <tr>
                  <td>4</td>
                  <td>Google TV's multi-user gap is documented</td>
                  <td>Android Police; 2025 bug reports</td>
                </tr>
                <tr>
                  <td>5</td>
                  <td>People already want mediated group decisions</td>
                  <td>ACM, shared remote viewing study</td>
                </tr>
              </tbody>
            </table>

            <div class="callout">
              <div class="label">Throughline</div>
              <p>Decision fatigue (universal) → co-viewing growth (trend) → relational friction (stakes) → Google TV's specific gap (opportunity) → AI-mediated negotiation (solution).</p>
            </div>
          </div>

          <div class="case-study-section" id="ep02">
            <h2>Episode 02 — Define</h2>
            <p>Defining users, their current journey pain points, and core UX principles for shared living rooms.</p>
            
            <div class="personas">
              <div class="persona">
                <div class="avatars"><div class="avatar blue">P</div><div class="avatar pink">J</div></div>
                <h3>Priya &amp; Jordan</h3>
                <p>The mismatched household. One shared account absorbs both their tastes into a muddled feed.</p>
                <div class="need">Wants to be seen as a real user, not a guest on someone else's profile.</div>
              </div>
              <div class="persona">
                <div class="avatars"><div class="avatar amber">A</div><div class="avatar green">A</div></div>
                <h3>The Alvarez family</h3>
                <p>Multi-generational household — two kids, two parents, a grandmother, sharply different needs.</p>
                <div class="need">Wants a shared decision that still respects each person's boundaries.</div>
              </div>
              <div class="persona">
                <div class="avatars"><div class="avatar blue">M</div></div>
                <h3>Marcus</h3>
                <p>The reluctant account holder. Roommates cast from their phones just to avoid touching "his" profile.</p>
                <div class="need">Wants to stop being the default decision-maker just because he owns the login.</div>
              </div>
            </div>

            <div class="journey">
              <div class="journey-step"><div class="stage">Arrival</div><p>Whoever grabs the remote controls the session — no negotiation exists.</p></div>
              <div class="journey-step"><div class="stage">Browse</div><p>Homescreen reflects one account's taste only.</p></div>
              <div class="journey-step"><div class="stage">Scroll</div><p>Group vetoes options out loud, 7–10.5 min average.</p></div>
              <div class="journey-step"><div class="stage">Conflict</div><p>Someone disengages or pushes their pick through.</p></div>
              <div class="journey-step"><div class="stage">Resolution</div><p>Group settles for a safe rewatch, or gives up.</p></div>
              <div class="journey-step"><div class="stage">Post-watch</div><p>Only the account holder's profile learns anything.</p></div>
            </div>

            <div class="principles">
              <div class="principle"><div class="n">01</div><div class="t">Represent the room, not the remote-holder</div></div>
              <div class="principle"><div class="n">02</div><div class="t">Negotiate, don't dictate</div></div>
              <div class="principle"><div class="n">03</div><div class="t">Explainable, not a black box</div></div>
              <div class="principle"><div class="n">04</div><div class="t">Ambient, not intrusive</div></div>
              <div class="principle"><div class="n">05</div><div class="t">Fair over frictionless</div></div>
            </div>
          </div>

          <div class="case-study-section" id="ep03">
            <h2>Episode 03 — Design</h2>
            <p>The core shift: instead of asking <em>"what does the account holder want,"</em> the system asks <em>"what does the room want"</em> — and every viewer's reaction feeds back into future suggestions.</p>

            <svg viewBox="0 0 680 200" width="100%" style="margin:24px 0 6px; overflow:visible;">
              <defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#726f7c" stroke-width="1.5"/></marker></defs>
              <g>
                <rect x="10" y="78" width="130" height="44" rx="8" fill="#201e28" stroke="#2c2938"/>
                <text x="75" y="96" text-anchor="middle" fill="#edeae3" font-family="Inter" font-size="11" font-weight="500">TV turns on</text>
                <text x="75" y="112" text-anchor="middle" fill="#726f7c" font-family="Inter" font-size="9">Multiple present</text>
              </g>
              <line x1="140" y1="100" x2="168" y2="100" stroke="#726f7c" stroke-width="1" marker-end="url(#a1)"/>
              <g>
                <rect x="170" y="78" width="130" height="44" rx="8" fill="#1c2a3d" stroke="#2f4867"/>
                <text x="235" y="96" text-anchor="middle" fill="#8ab4f8" font-family="Inter" font-size="11" font-weight="500">Detects viewers</text>
                <text x="235" y="112" text-anchor="middle" fill="#6f8bb0" font-family="Inter" font-size="9">Opt-in signals</text>
              </g>
              <line x1="300" y1="100" x2="328" y2="100" stroke="#726f7c" stroke-width="1" marker-end="url(#a1)"/>
              <g>
                <rect x="330" y="78" width="130" height="44" rx="8" fill="#291f38" stroke="#4a3768"/>
                <text x="395" y="96" text-anchor="middle" fill="#c9a8f0" font-family="Inter" font-size="11" font-weight="500">Proposes shortlist</text>
                <text x="395" y="112" text-anchor="middle" fill="#9c7dc4" font-family="Inter" font-size="9">Blends tastes</text>
              </g>
              <line x1="460" y1="100" x2="488" y2="100" stroke="#726f7c" stroke-width="1" marker-end="url(#a1)"/>
              <g>
                <rect x="490" y="78" width="130" height="44" rx="8" fill="#1a3226" stroke="#2f5940"/>
                <text x="555" y="96" text-anchor="middle" fill="#7cc48a" font-family="Inter" font-size="11" font-weight="500">Household picks</text>
                <text x="555" y="112" text-anchor="middle" fill="#5a9c68" font-family="Inter" font-size="9">Vote or veto</text>
              </g>
              <path d="M555 122 C 555 165, 235 165, 235 122" fill="none" stroke="#726f7c" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a1)"/>
              <text x="395" y="180" text-anchor="middle" fill="#726f7c" font-family="IBM Plex Mono" font-size="10">↻ outcome feeds tomorrow's shortlist</text>
            </svg>
            <div class="caption">FIG 3.1 — Group discovery flow, arrival to feedback loop</div>

            <div class="tv-frame">
              <div class="row">
                <span style="color:#9aa0a6;font-size:11px;">Google TV</span>
                <div class="tv-pill"><span class="dot blue"></span>Priya + Jordan watching</div>
              </div>
              <p style="color:#fff;font-size:13px;font-weight:500;margin:0 0 2px;">Tonight, for the room</p>
              <p style="color:#9aa0a6;font-size:11px;margin:0 0 14px;">Picked to work for both of you</p>
              <div class="tv-cards">
                <div class="tv-card hi"><div class="thumb"></div><div class="title">The Bear</div><span class="tag blue">Jordan loved S1</span><span class="tag pink">Priya: new to you</span></div>
                <div class="tv-card"><div class="thumb"></div><div class="title">Only Murders</div><span class="tag grey">Both watched S1</span></div>
                <div class="tv-card"><div class="thumb"></div><div class="title">Wednesday</div><span class="tag blue">Jordan's list</span></div>
              </div>
              <div class="quickpick">
                <div class="qp-row"><span class="qp-label">Quick pick</span><span class="qp-sub">Both remotes can vote</span></div>
                <div class="votes">
                  <div class="vote lead"><span>The Bear</span><span>●●○ 2</span></div>
                  <div class="vote trail"><span>Only Murders</span><span>●○○ 1</span></div>
                </div>
              </div>
            </div>
            <div class="caption">FIG 3.2 — Homescreen concept: "for the room" with reasoning tags and live voting</div>

            <div class="case-study-img-grid">
              <div>
                <p>Voice input is <strong>additive</strong>: "something funny" and "not too long" combine into one filtered shortlist, rather than one person's command overriding the other's.</p>
              </div>
              <div>
                <p>Veto is <strong>symmetric</strong> — anyone can rule an option out, and vetoed titles stay visible, greyed out, so the group can see what was cut and why.</p>
              </div>
            </div>

            <hr style="border-color: var(--border); margin: 2rem 0;">

            <h3>Trust layer: why this pick</h3>
            <p>Every recommendation needs to answer "whose interests does this reflect?" — a long press on any title expands into a short, specific rationale rather than a generic "recommended for you."</p>
            
            <div class="tv-frame" style="max-width:420px; margin: 1.5rem 0;">
              <p style="font-size:11px;color:#9aa0a6;margin:0 0 10px;">Long-press · why this pick</p>
              <div class="trust-card">
                <div class="trust-row"><span class="t-title">The Bear</span><span class="t-close">✕</span></div>
                <div class="trust-reason">
                  <div class="trust-dot" style="background:#8ab4f8;">J</div>
                  <p><span class="who">Jordan</span> finished season 1 last week</p>
                </div>
                <div class="trust-reason">
                  <div class="trust-dot" style="background:#f28bb8;">P</div>
                  <p><span class="who">Priya</span> hasn't seen it — matches her comedy-drama history</p>
                </div>
                <div class="trust-reason">
                  <div class="trust-dot" style="background:#726f7c;">i</div>
                  <p>Episodes run 25–30 min, fits a weeknight</p>
                </div>
              </div>
            </div>
            <div class="caption">FIG 3.3 — Explainability on demand, not forced into every card</div>

            <hr style="border-color: var(--border); margin: 2rem 0;">

            <h3>Variant: the multi-generational household</h3>
            <p>The Alvarez family stress-tests the model beyond two people. Content-appropriateness becomes a hard filter layered underneath taste-blending — a child's profile never sees an adult pick as a votable option, but everyone still sees themselves represented.</p>
            
            <div class="tv-frame">
              <div class="row">
                <span style="color:#9aa0a6;font-size:11px;">Google TV</span>
                <div class="tv-pill"><span class="dot blue"></span>4 watching · family mode</div>
              </div>
              <p style="color:#fff;font-size:13px;font-weight:500;margin:0 0 2px;">Something everyone can watch</p>
              <p style="color:#9aa0a6;font-size:11px;margin:0 0 14px;">Filtered for the youngest viewer, ranked for shared appeal</p>
              <div class="tv-cards">
                <div class="tv-card hi">
                  <div class="thumb"></div>
                  <div class="title">Luca</div>
                  <span class="age-badge">All ages</span>
                  <span class="tag blue" style="margin-top:5px;">Grandma's pick too</span>
                </div>
                <div class="tv-card">
                  <div class="thumb"></div>
                  <div class="title">Encanto</div>
                  <span class="age-badge">All ages</span>
                  <span class="tag grey">Kids requested twice</span>
                </div>
                <div class="tv-card" style="opacity:0.4;">
                  <div class="thumb"></div>
                  <div class="title">Stranger Things</div>
                  <span class="tag grey">Hidden · not age-appropriate tonight</span>
                </div>
              </div>
              <div class="quickpick">
                <div class="qp-row"><span class="qp-label">Everyone's in agreement</span><span class="qp-sub">No vote needed</span></div>
              </div>
            </div>
            <div class="caption">FIG 3.4 — Age-appropriateness filters before taste-blending ever runs, not after</div>

            <hr style="border-color: var(--border); margin: 2rem 0;">

            <h3>Variant: the hosted watch party</h3>
            <p>Ambient detection works well for people who live together, but it doesn't cover a friend group gathering for one night only. This variant introduces an explicit, host-led session for exactly that case — five people, one TV, no shared history to infer from.</p>

            <div class="callout">
              <div class="label">The scene</div>
              <p>Maya opens Google TV and taps <strong>Create Room</strong>. A QR code appears, calm and inviting, like a boarding pass for the evening. Leo, Aisha, Sam, and Ravi scan it with their phones and land straight inside Maya's room — no code to type, no room ID to hunt for. A soft chime marks each arrival: <em>4 of 5&nbsp;&hellip; 5 of 5.</em></p>
              <p style="margin-top:12px;">The TV asks a simple question: <em>"What's everyone in the mood for?"</em> Each phone becomes a quiet ballot — a mood, a title, a quick veto. The AI cross-references five suggestions against five taste profiles and narrows it to a short list built for <em>this group, tonight</em>. Maya, still holding the login, makes the final call — but she's choosing from options the whole room already shaped.</p>
            </div>

            <p style="margin-top:28px;"><strong>User flow</strong> &mdash; from room creation to playback:</p>
            <svg viewBox="0 0 680 470" width="100%" style="margin:16px 0 6px; overflow:visible;">
              <defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#726f7c" stroke-width="1.5"/></marker></defs>

              <rect x="190" y="10" width="300" height="50" rx="8" fill="#201e28" stroke="#2c2938"/>
              <text x="340" y="28" text-anchor="middle" fill="#edeae3" font-family="Inter" font-size="12" font-weight="500">Host creates a room</text>
              <text x="340" y="45" text-anchor="middle" fill="#9aa0a6" font-family="Inter" font-size="10">Logged in with Google TV</text>
              <line x1="340" y1="60" x2="340" y2="106" stroke="#726f7c" stroke-width="1" marker-end="url(#a2)"/>

              <rect x="190" y="108" width="300" height="50" rx="8" fill="#152230" stroke="#254057"/>
              <text x="340" y="126" text-anchor="middle" fill="#8ab4f8" font-family="Inter" font-size="12" font-weight="500">QR shown, 4 guests scan</text>
              <text x="340" y="143" text-anchor="middle" fill="#6f8bb0" font-family="Inter" font-size="10">Joins auto-open in the TV app</text>
              <line x1="340" y1="158" x2="340" y2="204" stroke="#726f7c" stroke-width="1" marker-end="url(#a2)"/>

              <rect x="190" y="206" width="300" height="50" rx="8" fill="#152230" stroke="#254057"/>
              <text x="340" y="224" text-anchor="middle" fill="#8ab4f8" font-family="Inter" font-size="12" font-weight="500">All 5 confirmed present</text>
              <text x="340" y="241" text-anchor="middle" fill="#6f8bb0" font-family="Inter" font-size="10">Each submits a suggestion</text>
              <line x1="340" y1="256" x2="340" y2="302" stroke="#726f7c" stroke-width="1" marker-end="url(#a2)"/>

              <rect x="190" y="304" width="300" height="50" rx="8" fill="#291f38" stroke="#4a3768"/>
              <text x="340" y="322" text-anchor="middle" fill="#c9a8f0" font-family="Inter" font-size="12" font-weight="500">AI ranks a shared shortlist</text>
              <text x="340" y="339" text-anchor="middle" fill="#9c7dc4" font-family="Inter" font-size="10">Blends suggestions + taste profiles</text>
              <line x1="340" y1="354" x2="340" y2="400" stroke="#726f7c" stroke-width="1" marker-end="url(#a2)"/>

              <rect x="190" y="402" width="300" height="50" rx="8" fill="#1a3226" stroke="#2f5940"/>
              <text x="340" y="420" text-anchor="middle" fill="#7cc48a" font-family="Inter" font-size="12" font-weight="500">Host picks, playback starts</text>
              <text x="340" y="437" text-anchor="middle" fill="#5a9c68" font-family="Inter" font-size="10">Session learns for next time</text>
            </svg>
            <div class="caption">FIG 3.5 — Room creation to playback, host-led throughout</div>

            <p style="margin-top:28px;"><strong>Architecture</strong> &mdash; four cooperating layers behind the flow:</p>
            <svg viewBox="0 0 680 300" width="100%" style="margin:16px 0 6px; overflow:visible;">
              <defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#726f7c" stroke-width="1.5"/></marker></defs>

              <rect x="40" y="6" width="140" height="32" rx="8" fill="#201e28" stroke="#2c2938"/>
              <text x="110" y="26" text-anchor="middle" fill="#c8c8c8" font-family="IBM Plex Mono" font-size="10">Google account</text>
              <line x1="110" y1="38" x2="110" y2="98" stroke="#726f7c" stroke-width="1" marker-end="url(#a3)"/>

              <rect x="20" y="46" width="640" height="220" rx="18" fill="none" stroke="#2c2938" stroke-width="1"/>
              <text x="350" y="72" text-anchor="middle" fill="#edeae3" font-family="Fraunces" font-size="14" font-weight="600">Rewatch platform</text>
